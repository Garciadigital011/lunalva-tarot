// Olho esotérico SVG
const EyeSymbol = ({size=60, color="#7a6438"}) => (
  <svg viewBox="0 0 100 70" width={size} height={size*0.7} style={{filter:`drop-shadow(0 0 8px ${color})`}}>
    {/* Raios */}
    {Array.from({length:16},(_,i)=>{
      const a=(i/16)*Math.PI*2, r1=28, r2=36;
      return <line key={i} x1={50+r1*Math.cos(a)} y1={35+r1*Math.sin(a)} x2={50+r2*Math.cos(a)} y2={35+r2*Math.sin(a)} stroke={color} strokeWidth="1.2" opacity="0.8"/>;
    })}
    {/* Olho externo */}
    <path d="M10,35 C25,10 75,10 90,35 C75,60 25,60 10,35 Z" fill="none" stroke={color} strokeWidth="1.5"/>
    {/* Iris */}
    <circle cx="50" cy="35" r="14" fill="none" stroke={color} strokeWidth="1.2"/>
    {/* Linhas internas da iris */}
    {Array.from({length:12},(_,i)=>{
      const a=(i/12)*Math.PI*2;
      return <line key={i} x1={50+6*Math.cos(a)} y1={35+6*Math.sin(a)} x2={50+13*Math.cos(a)} y2={35+13*Math.sin(a)} stroke={color} strokeWidth="0.8" opacity="0.6"/>;
    })}
    {/* Pupila */}
    <circle cx="50" cy="35" r="5" fill="none" stroke={color} strokeWidth="1.3"/>
    {/* Brilho */}
    <path d="M45,32 L50,25 L55,32" fill="none" stroke={color} strokeWidth="1" opacity="0.7"/>
  </svg>
);

  return(
    <div style={{position:"relative",background:noBg?"transparent":C.panel,border:`1px solid ${C.border}`,borderRadius:10,padding:"16px 18px",overflow:"hidden",...style}}>
      {/* Linhas top e bottom */}

      <div style={{position:"absolute",bottom:0,left:0,right:0,height:1,background:`linear-gradient(90deg,transparent,${C.amber},transparent)`}}/>

      <div style={{position:"absolute",top:0,right:0,bottom:0,width:1,background:`linear-gradient(180deg,transparent,${C.amber},${C.gold},${C.amber},transparent)`}}/>
      {/* Cantos decorativos */}
      {[{top:4,left:4},{top:4,right:4},{bottom:4,left:4},{bottom:4,right:4}].map((pos,i)=>(

      ))}
      {children}
    </div>
  );
}

// Normaliza string para comparação fuzzy
function norm(s){ return s.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/[^a-z0-9 ]/g," ").trim(); }

// Encontra spread pelo nome falado
function parseSpread(text){
  const t=norm(text);
  // aliases por jogo
  const aliases={
    "carta_dia":       ["carta do dia","carta dia","uma carta","card do dia"],
    "sim_nao":         ["sim ou nao","sim nao","sim e nao","yes or no"],
    "ppf":             ["passado presente futuro","passado presente","linha do tempo","tres cartas"],
    "pob":             ["problema obstaculo solucao","problema solucao","obstaculo solucao","problema obstáculo"],
    "autoconhecimento":["autoconhecimento","auto conhecimento","conhecer a si","quem sou eu"],
    "espelho":         ["espelho real","espelho","amor proprio","autoestima","auto estima"],
    "devo_confiar":    ["devo confiar","confiar","investigacao","investigar pessoa","confio nessa pessoa"],
    "lealdade":        ["revelacao de lealdade","lealdade","fidelidade","revelacao lealdade"],
    "ponte":           ["a ponte","ponte","conexao","unir"],
    "ferradura":       ["ferradura","sete cartas","7 cartas"],
    "abundancia":      ["rota da abundancia","abundancia","financeiro","dinheiro","prosperidade"],
    "roda":            ["roda da fortuna","roda fortuna","ciclos","fortuna"],
    "afrodite":        ["tempo de afrodite","afrodite","amor relacionamento","templo afrodite","relacionamento amoroso"],
    "cruz_celta":      ["cruz celta","dez cartas","10 cartas","leitura completa"],
  };
  for(const[id,list] of Object.entries(aliases)){
    if(list.some(a=>t.includes(norm(a))))return SPREADS.find(s=>s.id===id);
  }
  return null;
}

  const majorAliases={
    0: ["louco","fool"],
    1: ["mago","mage","magician"],
    2: ["sacerdotisa","sacerdota","priestess","suma sacerdotisa"],
    3: ["imperatriz","empress"],
    4: ["imperador","emperor"],
    5: ["hierofante","hierofanta","papa","pontifice"],
    6: ["amantes","amante","lovers"],
    7: ["carro","chariot"],
    8: ["forca","force","strength"],
    9: ["eremita","hermit"],
    10:["roda da fortuna","roda fortuna","wheel","fortuna"],
    11:["justica","justice"],
    12:["pendurado","hanged","enforcado"],
    13:["morte","death"],
    14:["temperanca","temperance"],
    15:["diabo","devil"],
    16:["torre","tower"],
    17:["estrela","star"],
    18:["lua","moon"],
    19:["sol","sun"],
    20:["julgamento","judgment","judgement"],
    21:["mundo","world"],
  };
  for(const[id,aliases] of Object.entries(majorAliases)){
    if(aliases.some(a=>t.includes(norm(a)))){
      const card=ALL.find(c=>c.id===parseInt(id));
      if(card&&!found.find(f=>f.id===card.id))found.push(card);
    }
  }
  // Arcanos Menores — ex: "ás de paus", "rei de copas", "dois de espadas"
  const rankMap={
    "as":0,"ace":0,"um":0,"ás":0,
    "dois":1,"two":1,"2":1,
    "tres":2,"three":2,"3":2,"três":2,
    "quatro":3,"four":3,"4":3,
    "cinco":4,"five":4,"5":4,
    "seis":5,"six":5,"6":5,
    "sete":6,"seven":6,"7":6,
    "oito":7,"eight":7,"8":7,
    "nove":8,"nine":8,"9":8,
    "dez":9,"ten":9,"10":9,
    "valete":10,"jack":10,"pajem":10,
    "cavaleiro":11,"knight":11,"cavalheiro":11,
    "rainha":12,"queen":12,
    "rei":13,"king":13,
  };
  const suitMap={
    "paus":0,"wands":0,"paus":0,"bastoes":0,
    "copas":1,"cups":1,"taças":1,
    "espadas":2,"swords":2,
    "ouros":3,"pentacles":3,"coins":3,"discos":3,
  };
  // Varre combinações rank + naipe
  for(const[rk,ri] of Object.entries(rankMap)){
    for(const[sk,si] of Object.entries(suitMap)){
      const patterns=[`${rk} de ${sk}`,`${rk} ${sk}`];
      if(patterns.some(p=>t.includes(norm(p)))){
        const cardId=22+si*14+ri;
        const card=ALL.find(c=>c.id===cardId);
        if(card&&!found.find(f=>f.id===card.id))found.push(card);
      }
    }
  }
  return found;
}

// Hook de reconhecimento de voz — corrigido
function useVoice(onResult){
  const[listening,setListening]=useState(false);
  const[transcript,setTranscript]=useState("");
  const recRef=useRef(null);
  const onResultRef=useRef(onResult);
  useEffect(()=>{ onResultRef.current=onResult; },[onResult]);

  const start=useCallback(()=>{
    const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
    if(!SR){
      alert("Reconhecimento de voz não disponível.\nAbra o app no Chrome (Android ou desktop) e garanta que o microfone está permitido.");
      return;
    }
    // Para qualquer instância anterior
    try{ recRef.current?.abort(); }catch(e){}

    const rec=new SR();
    rec.lang="pt-BR";
    rec.continuous=false;
    rec.interimResults=true;
    rec.maxAlternatives=3;

    rec.onstart=()=>{ setListening(true); setTranscript(""); };

    rec.onresult=(e)=>{
      let best="";
      for(let i=0;i<e.results.length;i++){
        const t=e.results[i][0].transcript;
        if(t.length>best.length) best=t;
      }
      setTranscript(best);
      if(e.results[e.results.length-1].isFinal){
        setListening(false);
        onResultRef.current(best);
      }
    };

    rec.onerror=(e)=>{
      setListening(false);
      if(e.error==="not-allowed"||e.error==="permission-denied"){
        alert("Microfone bloqueado.\n\nNo Chrome: clique no ícone de cadeado na barra de endereço → Microfone → Permitir → Recarregue a página.");
      }else if(e.error==="no-speech"){
        // silencioso — não houve fala
      }else{
        console.warn("Erro de voz:",e.error);
      }
    };

    rec.onend=()=>setListening(false);

    recRef.current=rec;
    try{
      rec.start();
    }catch(e){
      setListening(false);
      console.warn("Erro ao iniciar reconhecimento:",e);
    }
  },[]);

  const stop=useCallback(()=>{
    try{ recRef.current?.stop(); }catch(e){}
    setListening(false);
  },[]);

  return{listening,transcript,start,stop};
}

// Componente botão de voz flutuante
function VoiceBtn({onVoiceResult}){
  const[status,setStatus]=useState("idle");
  const[msg,setMsg]=useState("");
  const[permErr,setPermErr]=useState(false);

  const handleResult=useCallback((text)=>{
    if(!text?.trim()){ setStatus("error"); setMsg("Não ouvi nada. Tente falar mais perto."); setTimeout(()=>{setStatus("idle");setMsg("");},2800); return; }
    setStatus("parsing");
    setMsg(`"${text}"`);
    setTimeout(()=>{
      try{
        const result=onVoiceResult(text);
        if(result?.ok){ setStatus("done"); setMsg(result.msg); }
        else{ setStatus("error"); setMsg(result?.msg||"Não reconheci. Tente novamente."); }
      }catch(e){ setStatus("error"); setMsg("Erro ao processar. Tente novamente."); }
      setTimeout(()=>{setStatus("idle");setMsg("");},3500);
    },400);
  },[onVoiceResult]);

  const{listening,transcript,start,stop}=useVoice(handleResult);

  // Verifica permissão antes de iniciar
  async function handleClick(){
    if(listening){ stop(); return; }
    setPermErr(false);
    // Testa permissão via API se disponível
    if(navigator.permissions){
      try{
        const p=await navigator.permissions.query({name:"microphone"});
        if(p.state==="denied"){ setPermErr(true); setStatus("error"); setMsg("Microfone bloqueado. Clique no cadeado na barra de endereço → Permitir microfone → Recarregue."); setTimeout(()=>{setStatus("idle");setMsg("");},5000); return; }

    }
    start();

  const colors={

  return(
    <div style={{position:"fixed",bottom:28,right:20,zIndex:100,display:"flex",flexDirection:"column",alignItems:"flex-end",gap:8}}>
      {/* Balão de feedback */}
      {(listening||msg)&&(

          <div style={{position:"absolute",top:0,left:0,right:0,height:1,background:`linear-gradient(90deg,transparent,${col.border},transparent)`}}/>
          {listening?(
            <div>
              <div className="cinzel" style={{fontSize:8,letterSpacing:3,color:col.c,marginBottom:6}}>🎤 OUVINDO…</div>
              <div className="garamond" style={{fontSize:12,color:C.textDim,fontStyle:"italic",minHeight:18,lineHeight:1.5}}>{transcript||"Fale o nome do jogo e as cartas…"}</div>
              <div className="cinzel" style={{fontSize:7,color:C.textFaint,marginTop:6,letterSpacing:1}}>Ex: "Cruz Celta, O Sol, A Lua, O Mundo…"</div>
            </div>

                {status==="parsing"?"⟳ PROCESSANDO…"

          boxShadow:listening?`0 0 22px ${col.border},0 0 44px rgba(210,90,50,.15)`:`0 0 14px rgba(138,116,72,.18)`,
          transition:"all .3s",cursor:"pointer",position:"relative",outline:"none"}}>
        {listening&&<div style={{position:"absolute",inset:-5,borderRadius:"50%",border:`2px solid ${col.border}`,animation:"sp 1.8s linear infinite",opacity:.5}}/>}

//  MOTOR DE SÍNTESE DE VOZ (TTS) — fala a leitura em português
// ═══════════════════════════════════════════════════════════════════
const ttsRef = { current: null, speaking: false };

function speak(text, onEnd){
  if(!window.speechSynthesis){ onEnd&&onEnd(); return; }
  window.speechSynthesis.cancel();
  // Limpa markdown/títulos para leitura mais natural
  const clean = text
    .replace(/[#*_~`]/g,"")
    .replace(/\n{2,}/g,". ")
    .replace(/\n/g," ")
    .replace(/✦/g,"")
    .replace(/—/g,",")
    .slice(0,4000); // limita para não travar
  const utt = new SpeechSynthesisUtterance(clean);
  utt.lang = "pt-BR";
  utt.rate = 0.88;
  utt.pitch = 0.92;
  utt.volume = 1;
  // Tenta usar voz feminina pt-BR se disponível
  const voices = window.speechSynthesis.getVoices();
  const ptVoice = voices.find(v=>v.lang.startsWith("pt")&&v.name.toLowerCase().includes("female"))
    || voices.find(v=>v.lang.startsWith("pt-BR"))
    || voices.find(v=>v.lang.startsWith("pt"));
  if(ptVoice) utt.voice = ptVoice;
  utt.onend = ()=>{ ttsRef.speaking=false; onEnd&&onEnd(); };
  utt.onerror = ()=>{ ttsRef.speaking=false; onEnd&&onEnd(); };
  ttsRef.current = utt;
  ttsRef.speaking = true;
  window.speechSynthesis.speak(utt);
}

function stopSpeaking(){
  window.speechSynthesis?.cancel();
  ttsRef.speaking = false;
}

// Layout spreads — exibe TODAS as cartas do jogo
function SpreadLayout({spread,cards,onCardClick,onInfo}){
  const{pos,n}=spread;
  const Row=({a,b})=>(
    <div style={{display:"flex",gap:8,justifyContent:"center",flexWrap:"wrap",width:"100%"}}>
      {pos.slice(a,b).map((p,i)=>(
        <Tile key={a+i} card={cards[a+i]} pos={p.n} meaning={p.m} small onClick={()=>onCardClick(a+i)} onInfo={onInfo}/>
      ))}
    </div>
  );
  // 1 carta
  if(n===1)return(<div style={{display:"flex",justifyContent:"center"}}><Tile card={cards[0]} pos={pos[0].n} meaning={pos[0].m} onClick={()=>onCardClick(0)} onInfo={onInfo}/></div>);
  // 2 ou 3 cartas — linha única
  if(n<=3)return(<Row a={0} b={n}/>);
  // 4 cartas — linha única
  if(n===4)return(<Row a={0} b={4}/>);
  // 5 cartas — 3 + 2
  if(n===5)return(<div style={{display:"flex",flexDirection:"column",gap:10,alignItems:"center",width:"100%"}}><Row a={0} b={3}/><Row a={3} b={5}/></div>);
  // 6 cartas — 3 + 3
  if(n===6)return(<div style={{display:"flex",flexDirection:"column",gap:10,alignItems:"center",width:"100%"}}><Row a={0} b={3}/><Row a={3} b={6}/></div>);
  // 7 cartas — 4 + 3
  if(n===7)return(<div style={{display:"flex",flexDirection:"column",gap:10,alignItems:"center",width:"100%"}}><Row a={0} b={4}/><Row a={4} b={7}/></div>);
  // 10 cartas Cruz Celta — 3 linhas de 3/3/4
  if(n===10)return(<div style={{display:"flex",flexDirection:"column",gap:8,alignItems:"center",width:"100%"}}><Row a={0} b={4}/><Row a={4} b={7}/><Row a={7} b={10}/></div>);
  // fallback genérico — quebra em linhas de 4
  const rows=[];
  for(let i=0;i<n;i+=4)rows.push([i,Math.min(i+4,n)]);
  return(<div style={{display:"flex",flexDirection:"column",gap:10,alignItems:"center",width:"100%"}}>{rows.map(([a,b],i)=><Row key={i} a={a} b={b}/>)}</div>);
}

function TabJogos({voiceRef}){
  const[cat,setCat]=useState("todos");

  const[cards,setCards]=useState([]);
  const[pick,setPick]=useState(null);const[det,setDet]=useState(null);
  const[situacao,setSituacao]=useState(""); // situação do cliente
  const[ouvindoSit,setOuvindoSit]=useState(false); // mic p/ situação
  const[result,setResult]=useState("");const[loading,setLoading]=useState(false);
  const[resumo,setResumo]=useState("");const[loadingResumo,setLoadingResumo]=useState(false);

  // Mic para ouvir situação do cliente
  const{listening:listenSit,transcript:trSit,start:startSit,stop:stopSit}=useVoice((t)=>{
    setSituacao(prev=>prev?prev+" "+t:t);
    setOuvindoSit(false);
  });

  function sel(s){setSpread(s);setCards(Array(s.n).fill(null));setResult("");setResumo("");}
  function shuffle(){setCards([...ALL].sort(()=>Math.random()-.5).slice(0,spread.n));setResult("");setResumo("");}

  // Executa comando de voz quando disponível
  useEffect(()=>{
    if(!voiceRef?.current)return;
    const cmd=voiceRef.current;
    if(cmd&&!cmd.exec){
      cmd.exec=()=>{
        setSpread(cmd.spread);
        setCards(cmd.cards);
        setResult("");setResumo("");
        voiceRef.current=null;
        setTimeout(()=>runWithData(cmd.spread,cmd.cards,situacao),300);
      };
    }
  });

  async function runWithData(sp,cs,sit){
    setLoading(true);setResult("");setResumo("");setLoadingResumo(false);

    const sitCtx = sit?.trim()
      ? `\n\nCONTEXTO DA PESSOA: ${sit.trim()}\n\nConsidera este contexto em toda a leitura — relaciona cada posição com o que a pessoa está vivendo.`
      : "";

    try{
      const desc=cs.map((c,i)=>{
        const numVal=c.type==="maior"?`Arcano ${c.num}`:`${c.num} de ${c.suit||""}`;
        return `POSIÇÃO ${i+1} — "${sp.pos[i].n}"\nSignificado da posição: ${sp.pos[i].m}\nCarta: ${c.name} (${numVal}) | Elemento: ${c.el}${c.planet?` | ${c.planet}`:""} | ${c.ml}\nEssência: ${c.essence}\nPalavras-chave: ${c.kw}`;
      }).join("\n\n---\n\n");

      // Leitura principal + resumão em paralelo

function TabCombo(){
  const[mode,setMode]=useState("duas");

    setLoading(true);setResult("");

        const numVal=c.type==="maior"?`Arcano ${c.num}`:`${c.num} de ${c.suit||""}`;

// ─── APP ───────────────────────────────────────────────────────────
const TABS=[{id:"jogos",icon:"◎",l:"Jogos"},{id:"combinar",icon:"⊗",l:"Combinar"},{id:"arcanos",icon:"✦",l:"Arcanos"}];

// Ref global para comunicação App → TabJogos por voz
const voiceCommandRef = { current: null };

function App(){
  const[tab,setTab]=useState("jogos");
  const[showKey,setShowKey]=useState(false);
  const[apiKey,setApiKey]=useState(()=>localStorage.getItem("lunalva_key")||"");

  function salvarKey(k){
    setApiKey(k);
    window._LUNALVA_KEY=k;
    localStorage.setItem("lunalva_key",k);
    setShowKey(false);
    alert("✅ Chave salva! Pode usar as leituras.");
  }

  // Carrega chave salva
  useEffect(()=>{
    const k=localStorage.getItem("lunalva_key")||"";
    if(k){window._LUNALVA_KEY=k;setApiKey(k);}
  },[]);

  // Callback que recebe o texto de voz e tenta abrir o jogo com as cartas
  const handleVoiceResult=useCallback((text)=>{
    const spread=parseSpread(text);
    const cards=parseCards(text);

    if(!spread&&cards.length===0){
      return{ok:false,msg:`Não reconheci jogo nem cartas em: "${text}". Tente falar ex: "Cruz Celta, O Sol, A Lua, O Mundo"`};
    }
    if(!spread&&cards.length>0){
      return{ok:false,msg:`Cartas reconhecidas (${cards.map(c=>c.name).join(", ")}) mas não identifiquei o jogo. Fale o nome do jogo também.`};
    }

    // Monta comando para TabJogos executar
    const cmd={spread, cards: cards.slice(0,spread.n)};
    // Preenche cartas restantes aleatoriamente se não informou todas
    if(cmd.cards.length<spread.n){
      const usedIds=cmd.cards.map(c=>c.id);
      const pool=[...ALL].filter(c=>!usedIds.includes(c.id)).sort(()=>Math.random()-.5);
      while(cmd.cards.length<spread.n)cmd.cards.push(pool.shift());
    }

    voiceCommandRef.current=cmd;
    setTab("jogos");
    // Dispara após render
    setTimeout(()=>{
      if(voiceCommandRef.current?.exec)voiceCommandRef.current.exec();
    },150);

    const cardNames=cmd.cards.map(c=>c.name).join(", ");
    return{ok:true,msg:`${spread.name}\n${cardNames}`};
  },[]);

  return(
    <div style={{minHeight:"100vh",background:C.bg,position:"relative",overflowX:"hidden"}}>
      <style>{CSS}</style>
      <Stars/>
      <SideBars/>
      {/* Névoa de fundo */}
      <div style={{position:"fixed",top:"10%",left:"-5%",width:"45vw",height:"35vh",borderRadius:"50%",background:"radial-gradient(circle,rgba(92,72,40,.055) 0%,transparent 70%)",pointerEvents:"none",zIndex:0}}/>
      <div style={{position:"fixed",bottom:"10%",right:"-5%",width:"40vw",height:"30vh",borderRadius:"50%",background:"radial-gradient(circle,rgba(138,116,72,.04) 0%,transparent 70%)",pointerEvents:"none",zIndex:0}}/>

      <div style={{position:"relative",zIndex:1,maxWidth:580,margin:"0 auto",padding:"0 20px 90px"}}>

        {/* ── BOTÃO CHAVE API ── */}
        <div style={{position:"relative",paddingTop:12}}>
          <button onClick={()=>setShowKey(s=>!s)} style={{position:"absolute",top:12,right:0,background:"transparent",border:`1px solid ${apiKey?C.amberDim:"rgba(200,80,60,.4)"}`,borderRadius:8,padding:"4px 10px",color:apiKey?C.textFaint:"rgba(220,100,80,.8)",fontFamily:"'Cinzel',serif",fontSize:8,letterSpacing:2,cursor:"pointer"}}>
            {apiKey?"⚙ API OK":"⚠ CONFIG API"}
          </button>
          {showKey&&(
            <div style={{background:C.panel,border:`1px solid ${C.border}`,borderRadius:10,padding:"14px 16px",marginTop:40}}>
              <div className="cinzel" style={{fontSize:8,letterSpacing:3,color:C.goldDim,marginBottom:8}}>CHAVE ANTHROPIC API</div>
              <div className="garamond" style={{fontSize:12,color:C.textDim,fontStyle:"italic",marginBottom:10,lineHeight:1.6}}>
                Obtenha em: console.anthropic.com → API Keys → Create Key<br/>
                Começa com <strong style={{color:C.gold}}>sk-ant-</strong>
              </div>
              <div style={{display:"flex",gap:8}}>
                <input value={apiKey} onChange={e=>setApiKey(e.target.value)} placeholder="sk-ant-..." type="password"
                  style={{flex:1,background:"rgba(8,6,3,.9)",border:`1px solid ${C.amberDim}`,borderRadius:7,padding:"9px 12px",color:C.text,fontSize:13,outline:"none"}}/>
                <button onClick={()=>salvarKey(apiKey)} className="cinzel"
                  style={{background:"rgba(138,116,72,.15)",border:`1px solid ${C.goldBr}`,borderRadius:7,padding:"9px 16px",color:C.goldBr,fontSize:9,letterSpacing:2,cursor:"pointer"}}>SALVAR</button>
              </div>
            </div>
          )}
        </div>

        {/* ── HEADER com ornamentos ───────────────────────── */}
        <div style={{textAlign:"center",padding:"28px 0 22px",position:"relative"}}>
          <OrnamentTL/>
          <OrnamentTR/>
          <div style={{position:"relative",zIndex:2,paddingTop:10}}>
            <div className="cinzel" style={{fontSize:8,letterSpacing:8,color:C.goldDim,marginBottom:10,animation:"sh 3s ease-in-out infinite"}}>✦ ORÁCULO ARCANO ✦</div>
            {/* Olho esotérico centralizado */}
            <div style={{display:"flex",justifyContent:"center",marginBottom:12,animation:"eyePulse 4s ease-in-out infinite"}}>
              <EyeSymbol size={55} color={C.gold}/>
            </div>
            {/* Título gótico */}
            <h1 className="gothic" style={{fontSize:"clamp(28px,8vw,46px)",color:C.gold,letterSpacing:4,marginBottom:4,textShadow:`0 0 35px rgba(138,116,72,.5), 0 0 70px rgba(138,116,72,.2)`}}>
              Lunalva Arcana
            </h1>
            {/* Subtítulo estilo "Sem Filtro Tarot" */}
            <p className="gothic" style={{fontSize:"clamp(13px,4vw,19px)",color:C.goldPale,letterSpacing:2,marginBottom:12,opacity:.85,fontStyle:"italic",textShadow:`0 0 20px rgba(138,116,72,.3)`}}>
              O que as cartas revelam, você merece saber
            </p>
            {/* Divisor ornamental */}
            <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:10,marginBottom:6}}>
              <div style={{flex:1,height:1,background:`linear-gradient(90deg,transparent,${C.amber})`}}/>
              <svg viewBox="0 0 30 12" width={30} height={12}>
                <path d="M1,6 L8,1 L15,6 L22,1 L29,6 L22,11 L15,6 L8,11 Z" fill="none" stroke={C.gold} strokeWidth="0.8"/>
              </svg>
              <div style={{flex:1,height:1,background:`linear-gradient(90deg,${C.amber},transparent)`}}/>
            </div>
            <p className="cinzel" style={{fontSize:9,letterSpacing:3,color:C.textDim}}>14 JOGOS · 78 ARCANOS · DIRETO E INVERTIDO</p>
          </div>
        </div>

        {/* ── AVISO SAGRADO ── */}
        {tab==="jogos"&&(
        <div style={{marginBottom:22,padding:"20px 18px",borderRadius:12,background:"rgba(60,5,5,.5)",border:"1px solid rgba(200,40,40,.4)",position:"relative",overflow:"hidden"}}>
          <div style={{position:"absolute",top:0,left:0,right:0,height:2,background:"linear-gradient(90deg,transparent,rgba(200,40,40,.7),transparent)"}}/>
          <div style={{position:"absolute",bottom:0,left:0,right:0,height:2,background:"linear-gradient(90deg,transparent,rgba(200,40,40,.4),transparent)"}}/>
          <div style={{textAlign:"center",marginBottom:14}}>
            <div style={{fontSize:28,marginBottom:6}}>⚠️</div>
            <div className="cinzel" style={{fontSize:11,letterSpacing:4,color:"rgba(240,80,80,1)"}}>LEIA COM ATENÇÃO ANTES DE COMEÇAR</div>
          </div>
          <div className="garamond" style={{fontSize:15,color:"rgba(230,170,170,.95)",lineHeight:2.1,fontStyle:"italic"}}>
            O Tarot não é brincadeira. Não é entretenimento. Não é jogo.
          </div>
          <div style={{width:"100%",height:1,background:"linear-gradient(90deg,transparent,rgba(200,40,40,.3),transparent)",margin:"12px 0"}}/>
          <div className="garamond" style={{fontSize:14,color:"rgba(220,160,160,.9)",lineHeight:2.1}}>
            Quando você abre uma leitura para uma pessoa em estado de fragilidade emocional, espiritual ou mental — você está abrindo uma porta. E nem sempre o que entra por essa porta é o que você convidou.
          </div>
          <div style={{width:"100%",height:1,background:"linear-gradient(90deg,transparent,rgba(200,40,40,.3),transparent)",margin:"12px 0"}}/>
          <div className="cinzel" style={{fontSize:10,letterSpacing:2,color:"rgba(240,100,100,.9)",marginBottom:8}}>⚡ SOBRE VIBRAÇÃO E ENERGIA VITAL</div>
          <div className="garamond" style={{fontSize:14,color:"rgba(220,160,160,.9)",lineHeight:2.1}}>
            O jogo de tarot mexe com a energia de quem consulta e de quem lê. Quem está fragilizado — com dor intensa, mente agitada, luto recente, crise emocional ou baixa vibração — transmite essa energia para a leitura. Uma leitura feita nesse estado pode amplificar o que está negativo, drenar a energia vital de quem lê e de quem é lido, e abrir espaço para influências que não pertencem ao espaço sagrado.
          </div>
          <div style={{width:"100%",height:1,background:"linear-gradient(90deg,transparent,rgba(200,40,40,.3),transparent)",margin:"12px 0"}}/>
          <div className="cinzel" style={{fontSize:10,letterSpacing:2,color:"rgba(240,100,100,.9)",marginBottom:8}}>👁 SOBRE OBSESSÃO ESPIRITUAL</div>
          <div className="garamond" style={{fontSize:14,color:"rgba(220,160,160,.9)",lineHeight:2.1}}>
            Obsessores são entidades ou energias que se aproveitam de brechas abertas por desequilíbrio. Quando o tarot é usado de forma irresponsável — com alguém em fragilidade, sem proteção, sem preparo — ele pode funcionar como um convite para essas energias. O tarólogo que não cuida de si mesmo, que lê sem se proteger, que abre portais sem fechar, se torna vulnerável. O consultante também.
          </div>
          <div style={{width:"100%",height:1,background:"linear-gradient(90deg,transparent,rgba(200,40,40,.3),transparent)",margin:"12px 0"}}/>
          <div className="cinzel" style={{fontSize:10,letterSpacing:2,color:"rgba(240,100,100,.9)",marginBottom:8}}>🔥 A ESPIRITUALIDADE COBRA O QUE É DEVIDO</div>
          <div className="garamond" style={{fontSize:14,color:"rgba(220,160,160,.9)",lineHeight:2.1}}>
            A espiritualidade é generosa com quem a respeita. E severa com quem brinca. Usar o tarot como passatempo, curiosidade vazia ou para impressionar — cansa a ferramenta, fecha os caminhos e, em casos mais graves, cobra na própria vida de quem usa sem seriedade. Não existe uso casual do sagrado sem consequência.
          </div>
          <div style={{width:"100%",height:1,background:"linear-gradient(90deg,transparent,rgba(200,40,40,.3),transparent)",margin:"12px 0"}}/>
          <div className="garamond" style={{fontSize:15,color:"rgba(240,180,180,.95)",lineHeight:2.1,fontStyle:"italic",textAlign:"center"}}>
            Se você não está bem — não consulte agora. Aguarde. Cuide de si. Volte quando estiver centrado. As cartas sempre estarão aqui.
          </div>
          <div style={{width:"100%",height:1,background:"linear-gradient(90deg,transparent,rgba(200,40,40,.3),transparent)",margin:"12px 0"}}/>
          <div className="cinzel" style={{fontSize:10,letterSpacing:2,color:"rgba(240,100,100,.9)",marginBottom:8}}>✦ PARA ESTE APP FUNCIONAR DE VERDADE</div>
          <div className="garamond" style={{fontSize:14,color:"rgba(220,160,160,.9)",lineHeight:2.1}}>
            Esta ferramenta não é para qualquer pessoa. Para que ela funcione com profundidade real — e não seja apenas um brinquedo de palavras bonitas — quem a usa precisa ser consagrado. Precisa ter espiritualidade desenvolvida, guias trabalhados, mediunidade reconhecida e responsabilidade espiritual ativa. Sem consagração, as leituras geradas aqui podem ser um passatempo. Com consagração, são um instrumento sagrado.
          </div>
          <div className="garamond" style={{fontSize:14,color:"rgba(220,160,160,.9)",lineHeight:2.1,marginTop:10}}>
            O tarot não funciona pela máquina. Funciona pela pessoa que está usando a máquina. A inteligência artificial organiza o conhecimento — mas quem transmite a energia, quem conecta, quem lê de verdade é você. E para isso, você precisa estar preparado espiritualmente.
          </div>
          <div style={{width:"100%",height:1,background:"linear-gradient(90deg,transparent,rgba(200,40,40,.5),transparent)",margin:"12px 0"}}/>
          <div className="cinzel" style={{fontSize:11,letterSpacing:2,color:"rgba(255,60,60,1)",marginBottom:8}}>🚫 JAMAIS USE PARA ENGANAR</div>
          <div className="garamond" style={{fontSize:15,color:"rgba(240,170,170,.95)",lineHeight:2.1,fontStyle:"italic"}}>
            Usar o tarot para enganar, manipular, assustar ou tirar vantagem de alguém é uma das piores formas de abuso do sagrado. Quem usa o dom para enganar não está usando o dom — está usando a aparência do dom para o próprio benefício. A espiritualidade vê. E o que é feito no escuro, no sagrado, cobra com juros. Nunca use esta ferramenta para enganar ninguém. Jamais.
          </div>
          <div style={{width:"100%",height:1,background:"linear-gradient(90deg,transparent,rgba(200,40,40,.5),transparent)",margin:"14px 0"}}/>
          <div className="cinzel" style={{fontSize:11,letterSpacing:2,color:"rgba(240,100,100,.9)",marginBottom:10}}>💔 AS PESSOAS VÊM ATÉ NÓS QUANDO ESTÃO VULNERÁVEIS</div>
          <div className="garamond" style={{fontSize:15,color:"rgba(220,160,160,.9)",lineHeight:2.2}}>
            Quem busca uma cartomante não está bem. Está com medo. Com o coração partido. Com uma dúvida que não consegue responder sozinho. Com uma dor que não passou. Com uma esperança que está quase apagando. Eles chegam até nós no momento mais frágil — e é exatamente por isso que a responsabilidade de quem lê é enorme.
          </div>
          <div className="garamond" style={{fontSize:15,color:"rgba(220,160,160,.9)",lineHeight:2.2,marginTop:12}}>
            Uma palavra dita no momento errado pode destruir o que ainda restava de esperança. Uma afirmação feita com descuido pode criar um medo que a pessoa vai carregar por anos. Uma promessa que não deveria ser feita — do tipo "vai dar certo", "ele vai voltar", "você vai ser feliz" — pode prender essa pessoa numa ilusão enquanto a vida real passa.
          </div>
          <div className="garamond" style={{fontSize:15,color:"rgba(220,160,160,.9)",lineHeight:2.2,marginTop:12}}>
            As palavras têm peso. No sagrado, têm peso dobrado. O que sai da boca de quem lê cartas entra no coração de quem está ouvindo — porque essa pessoa está aberta, receptiva e esperando uma resposta. Ela acredita em você. Ela confia no processo. E essa confiança é sagrada demais para ser tratada com descuido.
          </div>
          <div style={{width:"100%",height:1,background:"linear-gradient(90deg,transparent,rgba(200,40,40,.5),transparent)",margin:"14px 0"}}/>
          <div className="cinzel" style={{fontSize:11,letterSpacing:2,color:"rgba(240,100,100,.9)",marginBottom:10}}>🔥 NÃO FAÇA POR EGO</div>
          <div className="garamond" style={{fontSize:15,color:"rgba(220,160,160,.9)",lineHeight:2.2}}>
            O ego quer impressionar. Quer ser o que sabe mais. Quer o reconhecimento, o olhar de admiração, o "nossa, como você acertou". O ego transforma o sagrado em espetáculo. E quando o sagrado vira espetáculo — ele perde a força. A leitura que nasce do ego não conecta com nada além da vaidade de quem lê.
          </div>
          <div className="garamond" style={{fontSize:15,color:"rgba(220,160,160,.9)",lineHeight:2.2,marginTop:12}}>
            Se você está usando o tarot para provar algo para alguém, para se sentir especial, para ter poder sobre a situação de outra pessoa — pare. Respire. Pergunte a si mesmo por que está fazendo isso. A resposta honesta vai te dizer se você está pronto ou não.
          </div>
          <div style={{width:"100%",height:1,background:"linear-gradient(90deg,transparent,rgba(200,40,40,.5),transparent)",margin:"14px 0"}}/>
          <div className="cinzel" style={{fontSize:11,letterSpacing:2,color:"rgba(240,100,100,.9)",marginBottom:10}}>🛡 NÃO SE CONSAGRE SEM PROTEÇÃO</div>
          <div className="garamond" style={{fontSize:15,color:"rgba(220,160,160,.9)",lineHeight:2.2}}>
            Consagração não é um ritual que você inventa sozinho. É um compromisso espiritual que exige preparo, guia e proteção de quem já percorreu esse caminho. Sem a proteção de quem te consagrou — de quem conhece o caminho, que tem autoridade espiritual para abrir esse portal com você — você está entrando em terreno perigoso sem armadura.
          </div>
          <div className="garamond" style={{fontSize:15,color:"rgba(220,160,160,.9)",lineHeight:2.2,marginTop:12}}>
            Quem se consagra sozinho, sem guia, sem proteção, sem saber o que está fazendo — abre uma porta sem saber fechar. E o que entra por portas abertas sem intenção não é sempre benevolente. Busque quem sabe. Busque quem já foi pelo caminho. A humildade de aprender com quem chegou antes é parte da consagração.
          </div>
          <div style={{width:"100%",height:1,background:"linear-gradient(90deg,transparent,rgba(200,40,40,.3),transparent)",margin:"12px 0"}}/>
          <div className="garamond" style={{fontSize:16,color:"rgba(250,190,190,.95)",lineHeight:2.1,fontStyle:"italic",textAlign:"center"}}>
            Saiba o que você está fazendo. Saiba com quem aprendeu. Saiba quem te protege. Sem isso — não comece.
          </div>
        </div>
        )}

        {/* ── TABS ──────────────────────────────────────── */}
        <Panel style={{padding:4,marginBottom:22,background:"transparent"}}>
          {TABS.map(t=>(<button key={t.id} onClick={()=>setTab(t.id)} className="cinzel" style={{flex:1,padding:"9px 4px",borderRadius:8,border:"none",background:tab===t.id?"rgba(138,116,72,.11)":"transparent",color:tab===t.id?C.gold:C.textDim,fontSize:"clamp(9px,2.5vw,11px)",letterSpacing:1.5,transition:"all .2s",cursor:"pointer",display:"inline-block",width:"33.33%",borderBottom:tab===t.id?`1px solid ${C.goldBr}`:"1px solid transparent"}}>
            <div style={{marginBottom:2,fontSize:15}}>{t.icon}</div>
            <div>{t.l}</div>
          </button>))}
        </Panel>

        {tab==="jogos"   &&<TabJogos voiceRef={voiceCommandRef}/>}
        {tab==="combinar"&&<TabCombo/>}
        {tab==="arcanos" &&<TabArcanos/>}

        {/* Footer com ornamentos */}
        <div style={{textAlign:"center",marginTop:50,position:"relative"}}>
          <OrnamentBL/>
          <OrnamentBR/>
          <div style={{position:"relative",zIndex:1}}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:8,marginBottom:8}}>
              <div style={{flex:1,height:1,background:`linear-gradient(90deg,transparent,${C.amber})`}}/>
              <EyeSymbol size={22} color={C.goldDim}/>
              <div style={{flex:1,height:1,background:`linear-gradient(90deg,${C.amber},transparent)`}}/>
            </div>
            <div className="cinzel" style={{fontSize:8,letterSpacing:3,color:C.textFaint}}>✦ LUNALVA ARCANA · 78 ARCANOS · 14 JOGOS ✦</div>
          </div>
        </div>
      </div>

      {/* Botão de voz flutuante */}
      <VoiceBtn onVoiceResult={handleVoiceResult}/>
    </div>
  );
}

// Inicializa
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
