  return <div style={{position:"fixed",inset:0,pointerEvents:"none",zIndex:0}}>
    {STARS.map((s,i)=><div key={i} style={{position:"absolute",left:`${s.x}%`,top:`${s.y}%`,width:`${s.s}px`,height:`${s.s}px`,borderRadius:"50%",background:s.s>1.2?E.purple:"rgba(220,190,130,.4)",animation:`tw ${s.dur}s ${s.d}s ease-in-out infinite alternate`}}/>)}

}

function SideBars(){
  const b={position:"fixed",top:0,bottom:0,width:3,zIndex:20,background:`linear-gradient(180deg,transparent,${E.deep},${E.purple},${E.deep},transparent)`,opacity:.7};
  return <><div style={{...b,left:0}}/><div style={{...b,right:0}}/></>;
}

function Panel({children,style={}}){
  return(
    <div style={{position:"relative",background:E.panel,border:`1px solid ${E.border}`,borderRadius:10,padding:"16px 18px",overflow:"hidden",...style}}>
      <div style={{position:"absolute",top:0,left:0,right:0,height:1,background:`linear-gradient(90deg,transparent,${E.purple},${E.purplePale},${E.purple},transparent)`}}/>

        <svg key={i} viewBox="0 0 14 14" width={14} height={14} style={{position:"absolute",...pos,opacity:.55}}>

const FUNDAMENTOS=[
  {id:"origem",icon:"🌙",titulo:"A Origem do Tarot",conteudo:`O Tarot não é uma invenção moderna. Suas raízes mais profundas se entrelaçam com a Cabala judaica, o hermetismo egípcio, a numerologia pitagórica e a astrologia babilônica. As primeiras cartas conhecidas como tarot surgiram na Itália do século XV, mas o simbolismo nelas gravado é muito mais antigo — como se o conhecimento sagrado de diferentes tradições tivesse encontrado nas cartas uma forma de ser transmitido.

O Tarot não é adivinhação no sentido de "prever o futuro". É uma ferramenta de conexão com o inconsciente, com arquétipos universais e com a sabedoria que já existe dentro de você. As cartas não criam realidades — elas refletem energias que já estão em movimento.

Por isso o Tarot é sagrado. Ele merece ser tratado com respeito, seriedade e preparo.`},
  {id:"como_funciona",icon:"◉",titulo:"Como o Tarot Funciona",conteudo:`O baralho de Tarot tem 78 cartas divididas em dois grandes grupos: os 22 Arcanos Maiores e os 56 Arcanos Menores.

Os ARCANOS MAIORES representam as grandes forças, lições e arquétipos da vida humana. São os temas universais — amor, morte, transformação, sabedoria, poder. Quando aparecem numa leitura, indicam temas profundos e situações de maior impacto.

Os ARCANOS MENORES representam as situações do cotidiano divididas em 4 naipes: Paus (Fogo — ação e criação), Copas (Água — emoções e amor), Espadas (Ar — mente e conflito) e Ouros (Terra — material e estabilidade).

As cartas não falam sozinhas — elas falam em conjunto. Uma carta muda de tom dependendo das que estão ao redor, da posição no jogo e da intuição de quem lê.`},
  {id:"intuicao",icon:"👁",titulo:"A Intuição é a Base",conteudo:`Antes de qualquer técnica, antes de qualquer significado decorado, existe a intuição. Esta é a ferramenta mais poderosa de uma tarólogoa.

Quando você olha para uma carta, o que você sente? O que você vê? Que emoção ela desperta? Que palavra surge espontaneamente?

Esse impulso primeiro, antes da mente analítica entrar, é a linguagem do inconsciente — e é exatamente o que o Tarot convida a acessar.

A técnica serve para estruturar e aprofundar. A intuição serve para conectar. Uma sem a outra resulta numa leitura incompleta.

Ao estudar cada carta aqui, sempre pergunte primeiro: O que EU vejo? O que EU sinto? Depois leia o significado.`},
  {id:"elementos",icon:"🜂",titulo:"Os 4 Elementos Sagrados",conteudo:`Tudo no Tarot é construído sobre os 4 elementos. Eles são a linguagem fundamental do baralho.

🜂 FOGO (Paus) — Energia, vontade, paixão, criatividade, transformação pelo calor. O fogo move, cria e destrói para renovar.

🜄 ÁGUA (Copas) — Emoção, intuição, amor, sonhos, o inconsciente. A água flui, reflete e se molda a qualquer forma.

🜁 AR (Espadas) — Mente, pensamento, comunicação, conflito, decisão. O ar é invisível mas cortante como uma espada.

🜃 TERRA (Ouros) — Matéria, corpo, dinheiro, estabilidade, trabalho. A terra sustenta, nutre e concretiza.

Cada naipe pertence a um elemento. Cada arcano maior também tem sua correspondência elementar. Quando muitas cartas do mesmo elemento aparecem numa leitura, aquele elemento está em destaque na vida da pessoa.`},
  {id:"numerologia",icon:"✦",titulo:"Numerologia no Tarot",conteudo:`Os números nos Arcanos Maiores (0 ao XXI) e nos naipes (Ás ao 10) têm significados próprios que se somam ao da carta.

0 — Potencial infinito. Antes do começo.
1 — Iniciação. O começo. Força criadora.
2 — Dualidade. Escolha. Equilíbrio entre opostos.
3 — Expressão. Criatividade. Crescimento.
4 — Estabilidade. Fundação. Estrutura.
5 — Mudança. Liberdade. Desafio que transforma.
6 — Harmonia. Responsabilidade. União.
7 — Reflexão. Espiritualidade. Fé posta à prova.
8 — Poder. Ciclos. O infinito em movimento.
9 — Conclusão. Sabedoria antes do fim.
10 — Completude. Um ciclo se fecha.

Arcanos Maiores com números maiores que 10 somam seus algarismos. XIV=1+4=5. Isso dá uma camada a mais de leitura.`},
  {id:"movimento",icon:"⚡",titulo:"Movimento e Estase",conteudo:`Uma das chaves únicas do Tarot é entender se uma carta é de MOVIMENTO ou de ESTASE. Isso diz se a energia está em fluxo ou parada.

⚡ CARTAS DE MOVIMENTO — Indicam que algo está acontecendo, mudando ou prestes a chegar. São convites à ação, sinais de transformação em curso. Quando muitas cartas de movimento aparecem, a pessoa está num período de grandes mudanças.

◉ CARTAS DE ESTASE — Indicam que algo está parado, consolidado ou pedindo reflexão. Não é estagnação negativa — é o momento de sentir antes de agir. Quando muitas cartas de estase aparecem, é hora de aguardar antes de agir.

Cada naipe tem sua natureza: Paus e Espadas são de movimento (Fogo e Ar). Copas e Ouros são de estase (Água e Terra). Mas cada carta específica pode ter sua própria energia.

Observar a proporção de movimento/estase numa leitura diz muito sobre o momento da pessoa.`},
  {id:"corte",icon:"👑",titulo:"As Cartas da Corte",conteudo:`As cartas da corte são o Valete, o Cavaleiro, a Rainha e o Rei de cada naipe. São as mais complexas de interpretar porque podem representar três coisas diferentes:

1. UMA PESSOA — Alguém na vida da pessoa consultada, com as características daquele naipe/posição.

2. UM ASPECTO INTERNO — Uma parte da personalidade da própria pessoa que está ativa.

3. UMA ENERGIA — Uma forma de ser ou agir que é pedida ou que está presente.

VALETE — Energia jovem, mensageiro, notícia nova. A semente do naipe.
CAVALEIRO — Ação intensa e às vezes impulsiva. O naipe em movimento máximo.
RAINHA — Sabedoria receptiva. Domínio interior do naipe.
REI — Autoridade madura. Domínio externo e liderança.

O contexto da leitura sempre dirá qual das três interpretações se aplica.`},
  {id:"etica",icon:"🔥",titulo:"Ética e Responsabilidade",conteudo:`Esta é a parte mais importante de todo o estudo.

O Tarot tem poder real. Uma palavra dita no momento certo pode transformar uma vida. Uma palavra errada pode ferir. Quem lê cartas para outras pessoas assume uma responsabilidade espiritual que não pode ser tomada de forma leviana.

NUNCA: Diga que alguém vai morrer, que vai ter acidente, que o parceiro vai trair — mesmo que você "veja" isso. O Tarot mostra tendências, não certezas.

NUNCA: Leia para alguém que está em crise emocional aguda com o objetivo de "consertar" — encaminhe para ajuda profissional.

NUNCA: Use o Tarot para manipular alguém ou para influenciar decisões que não são suas.

SEMPRE: Pergunte o que a pessoa quer explorar. Contextualize. Dê ferramentas, não certezas.

SEMPRE: Proteja sua energia antes de uma leitura. Limpe o espaço. Tenha intenção clara.

SEMPRE: Lembre que você é um canal — não a fonte. A humildade é parte do dom.

O dom do Tarot é uma responsabilidade, não um privilégio.`},
  {id:"embaralhar",icon:"🌀",titulo:"Como Embaralhar com Intenção",conteudo:`O embaralhamento não é só misturar cartas — é um ritual de conexão.

Antes de embaralhar:
— Limpe o espaço (incenso, sal, ou simplesmente silêncio intencional)
— Respire fundo e esvazie a mente
— Formule claramente a pergunta ou intenção
— Se for para outra pessoa, peça que ela segure as cartas e coloque sua energia nelas

Durante o embaralhamento:
— Não há regra de quantas vezes embaralhar — siga sua intuição
— Se uma carta cair, ela quer ser vista. Não ignore.
— A forma de embaralhar (riffle, hindu, overhand) não importa — o que importa é a intenção

Depois de embaralhar:
— Corte o baralho em 3 partes com a mão não dominante e reúna
— Ou peça que a pessoa corte
— Tire as cartas com calma, sentindo cada uma`},
  {id:"pergunta",icon:"?",titulo:"Como Formular uma Pergunta",conteudo:`A qualidade da pergunta determina a qualidade da resposta.

PERGUNTAS ABERTAS são melhores que perguntas fechadas.
"Como posso melhorar minha relação com X?" é melhor que "X vai me trair?".
"O que preciso saber sobre meu trabalho?" é melhor que "Vou ser promovida?".

PERGUNTAS FOCADAS são melhores que perguntas vagas.
"O que está bloqueando minha prosperidade?" é melhor que "Como está minha vida?".

NUNCA repita a mesma pergunta no mesmo dia esperando uma resposta diferente. As cartas respondem uma vez. Repetir é tentar forçar um resultado — e o baralho "fecha".

A pergunta deve vir de um lugar de genuína curiosidade e abertura, não de medo ou necessidade de confirmar o que já acredita.`},
];

function FundamentoCard({f,onClick}){

      onMouseEnter={e=>e.currentTarget.style.borderColor=E.purpleBr}
      onMouseLeave={e=>e.currentTarget.style.borderColor=E.border}>
      <div style={{position:"absolute",top:0,left:0,bottom:0,width:2,background:`linear-gradient(180deg,transparent,${E.purple},transparent)`,opacity:.6}}/>
      <div style={{display:"flex",alignItems:"center",gap:10}}>
        <div style={{width:36,height:36,borderRadius:"50%",border:`1px solid ${E.deepDim}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,background:"rgba(123,95,160,.08)",flexShrink:0}}>{f.icon}</div>
        <div>
          <div className="cinzel" style={{fontSize:12,color:E.purplePale,marginBottom:2}}>{f.titulo}</div>
          <div className="garamond" style={{fontSize:11,color:E.textDim,fontStyle:"italic"}}>{f.conteudo.slice(0,60)}…</div>
        </div>
        <div style={{color:E.purpleDim,fontSize:16,marginLeft:"auto",flexShrink:0}}>›</div>
      </div>
    </div>
  );
}

function TabArcanos(){
  const[q,setQ]=useState("");const[fil,setFil]=useState("todos");

  const list=ALL.filter(c=>{
    if(fil==="maior"&&c.type!=="maior")return false;
    if(["paus","copas","espadas","ouros"].includes(fil)&&c.suit?.toLowerCase()!==fil)return false;

                    <div className="cinzel" style={{fontSize:16,color:E.purple,marginBottom:2}}>{card.num}</div>
                    <div className="garamond" style={{fontSize:10,color:E.textDim,fontStyle:"italic",lineHeight:1.4}}>
                      {{"0":"Potencial infinito","I":"Iniciação. Força criadora","II":"Dualidade. Equilíbrio","III":"Expressão. Criatividade","IV":"Estrutura. Estabilidade","V":"Mudança. Liberdade","VI":"Harmonia. União","VII":"Movimento. Fé","VIII":"Poder. Infinito","IX":"Conclusão. Sabedoria","X":"Ciclos. Completude","XI":"Causa e efeito","XII":"Rendição. Nova visão","XIII":"Transformação","XIV":"Alquimia. Paciência","XV":"Matéria. Ilusão","XVI":"Ruptura. Revelação","XVII":"Esperança. Renovação","XVIII":"Ciclos. Intuição","XIX":"Luz. Alegria total","XX":"Despertar. Chamado","XXI":"Totalidade. Realização"}[card.num]||""}
                    </div>
                  </div>
                )}
                {card.planet&&(
                  <div style={{padding:"10px 11px",borderRadius:8,background:"rgba(123,95,160,.06)",border:`1px solid ${E.deepDim}`}}>
                    <div className="cinzel" style={{fontSize:7,letterSpacing:2,color:E.purpleDim,marginBottom:3}}>ASTRO REGENTE</div>
                    <div style={{fontSize:16,marginBottom:2}}>✦</div>
                    <div className="cinzel" style={{fontSize:10,color:E.purple,marginBottom:2}}>{card.planet}</div>
                    <div className="garamond" style={{fontSize:10,color:E.textDim,fontStyle:"italic",lineHeight:1.4}}>Influência planetária</div>
                  </div>
                )}
              </div>
            </Panel>

            {/* Simbolismo e Ensinamento — só maiores */}
            {card.type==="maior"&&card.simbolismo&&(
              <Panel style={{marginTop:8,padding:"14px 16px"}}>
                <div className="cinzel" style={{fontSize:8,letterSpacing:4,color:E.purpleDim,marginBottom:7}}>SIMBOLISMO</div>
                <p className="garamond" style={{color:E.text,fontSize:13,lineHeight:1.9}}>{card.simbolismo}</p>
              </Panel>
            )}
            {card.type==="maior"&&card.ensinamento&&(
              <Panel style={{marginTop:8,padding:"14px 16px",background:"rgba(60,40,80,.2)",borderColor:"rgba(123,95,160,.3)"}}>
                <div className="cinzel" style={{fontSize:8,letterSpacing:4,color:E.purpleBr,marginBottom:7}}>✦ ENSINAMENTO CENTRAL</div>
                <p className="garamond" style={{color:E.purplePale,fontSize:14,fontStyle:"italic",lineHeight:1.9}}>{card.ensinamento}</p>
              </Panel>
            )}
            {card.type==="menor"&&card.ensinamento&&(
              <Panel style={{marginTop:8,padding:"14px 16px",background:"rgba(60,40,80,.2)",borderColor:"rgba(123,95,160,.3)"}}>
                <div className="cinzel" style={{fontSize:8,letterSpacing:4,color:E.purpleBr,marginBottom:7}}>✦ ENSINAMENTO DO NAIPE</div>
                <p className="garamond" style={{color:E.purplePale,fontSize:14,fontStyle:"italic",lineHeight:1.9}}>{card.ensinamento}</p>
              </Panel>
            )}

            {/* Cores */}
            {card.cores&&(
              <Panel style={{marginTop:8,padding:"14px 16px"}}>
                <div className="cinzel" style={{fontSize:8,letterSpacing:4,color:E.purpleDim,marginBottom:6}}>CORES E SIMBOLISMO VISUAL</div>
                <p className="garamond" style={{color:E.text,fontSize:13,fontStyle:"italic",lineHeight:1.8}}>{card.cores}</p>
              </Panel>
            )}

            {/* Direto e Invertido */}
            <Panel style={{marginTop:8,padding:"14px 16px"}}>
              <div className="cinzel" style={{fontSize:8,letterSpacing:4,color:E.purpleDim,marginBottom:8}}>QUANDO APARECE DIRETA</div>
              <p className="garamond" style={{color:E.text,fontSize:13,lineHeight:1.85}}>{card.d?.g}</p>
            </Panel>
            <Panel style={{marginTop:8,padding:"14px 16px",background:"rgba(80,10,10,.3)",borderColor:"rgba(160,40,40,.25)"}}>
              <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:7}}>
                <span style={{fontSize:13,color:"rgba(200,80,80,.55)"}}>↕</span>
                <div className="cinzel" style={{fontSize:8,letterSpacing:4,color:"rgba(200,80,80,.55)"}}>QUANDO APARECE INVERTIDA</div>
              </div>
              <p className="garamond" style={{color:"rgba(220,160,160,.72)",fontSize:13,fontStyle:"italic",lineHeight:1.85}}>{card.r?.g}</p>
            </Panel>
          </div>
        )}

        {aba==="intuicao"&&(
          <div style={{marginTop:10}}>
            <Panel style={{padding:"13px 15px",background:"rgba(60,40,80,.15)",borderColor:"rgba(123,95,160,.3)",marginBottom:10}}>
              <div className="cinzel" style={{fontSize:8,letterSpacing:3,color:E.purpleBr,marginBottom:6}}>👁 EXERCÍCIO DE INTUIÇÃO</div>
              <div className="garamond" style={{fontSize:13,color:E.text,lineHeight:1.8,fontStyle:"italic"}}>
                Olhe para a carta acima. Não pense no significado que aprendeu. Apenas sinta. Responda com honestidade — não há resposta errada. A intuição é a sua ferramenta mais poderosa.
              </div>
            </Panel>

            <div style={{marginBottom:8}}>
              <div style={{display:"flex",gap:3,marginBottom:10}}>
                {perguntasIntuicao.map((_,i)=>(
                  <div key={i} style={{flex:1,height:3,borderRadius:2,background:i<=perguntaAtual?E.purpleBr:E.deepDim}}/>
                ))}
              </div>
              <div className="cinzel" style={{fontSize:8,letterSpacing:2,color:E.purpleDim,marginBottom:3}}>PERGUNTA {perguntaAtual+1} DE {perguntasIntuicao.length}</div>
            </div>

            <Panel style={{padding:"16px 16px"}}>
              <p className="cinzel" style={{fontSize:13,color:E.purplePale,lineHeight:1.7,marginBottom:6}}>{perguntasIntuicao[perguntaAtual].p}</p>
              <p className="garamond" style={{fontSize:12,color:E.textDim,fontStyle:"italic",marginBottom:12}}>{perguntasIntuicao[perguntaAtual].d}</p>
              <textarea value={resp} onChange={e=>setResp(e.target.value)} placeholder="Escreva sua resposta aqui…" rows={4}
                style={{width:"100%",background:"rgba(8,5,15,.8)",border:`1px solid ${E.deepDim}`,borderRadius:8,padding:"10px 12px",color:E.text,fontSize:14,outline:"none",resize:"vertical",lineHeight:1.7}}/>
              <div style={{display:"flex",justifyContent:"center",marginTop:10}}>
                <button onClick={avaliarResposta} disabled={!resp.trim()||loadingFB} className="cinzel"
                  style={{padding:"10px 22px",borderRadius:8,border:`1px solid ${E.purpleBr}`,background:"rgba(123,95,160,.1)",color:E.purplePale,fontSize:10,letterSpacing:2,cursor:"pointer"}}>
                  {loadingFB?"⟳ AVALIANDO…":"✦ RECEBER FEEDBACK DA IA"}
                </button>
              </div>
            </Panel>

            {feedbackIA&&(
              <Panel style={{marginTop:10,padding:"15px 16px",background:"rgba(40,30,60,.3)",borderColor:"rgba(123,95,160,.35)"}}>
                <div className="cinzel" style={{fontSize:8,letterSpacing:3,color:E.purpleBr,marginBottom:8}}>✦ FEEDBACK</div>
                <div className="garamond" style={{color:E.text,fontSize:14,lineHeight:2,whiteSpace:"pre-line"}}>{feedbackIA}</div>
                {perguntaAtual<perguntasIntuicao.length-1&&(
                  <div style={{textAlign:"center",marginTop:12}}>
                    <button onClick={proximaPergunta} className="cinzel" style={{padding:"9px 20px",borderRadius:8,border:`1px solid ${E.border}`,background:"transparent",color:E.textDim,fontSize:9,letterSpacing:2,cursor:"pointer"}}>PRÓXIMA PERGUNTA ›</button>
                  </div>
                )}
                {perguntaAtual===perguntasIntuicao.length-1&&(
                  <div style={{marginTop:12,textAlign:"center"}}>
                    <div className="cinzel" style={{fontSize:9,color:E.purplePale,letterSpacing:2}}>✦ EXERCÍCIO CONCLUÍDO ✦</div>
                    <div className="garamond" style={{fontSize:12,color:E.textDim,fontStyle:"italic",marginTop:4}}>Você completou o exercício intuitivo desta carta.</div>
                  </div>
                )}
              </Panel>
            )}
          </div>
        )}

        <div style={{textAlign:"center",marginTop:16}}>
          <button onClick={onClose} className="cinzel" style={{background:"transparent",border:`1px solid ${E.border}`,borderRadius:8,padding:"9px 24px",color:E.textDim,fontSize:10,letterSpacing:3,cursor:"pointer"}}>VOLTAR</button>
        </div>
      </div>
    </div>
  );
}

// ── APP ESTUDO ────────────────────────────────────────────────────
const TABS_E=[{id:"fund",icon:"📚",l:"Fundamentos"},{id:"arcanos",icon:"🌙",l:"Arcanos"}];

function App(){
  const[tab,setTab]=useState("fund");
  const[showKey,setShowKey]=useState(false);
  const[apiKey,setApiKey]=useState(()=>localStorage.getItem("lunalva_key")||"");

  useEffect(()=>{
    const k=localStorage.getItem("lunalva_key")||"";
    if(k){window._LUNALVA_KEY=k;setApiKey(k);}
  },[]);

  function salvarKey(k){
    setApiKey(k);window._LUNALVA_KEY=k;localStorage.setItem("lunalva_key",k);
    setShowKey(false);alert("✅ Chave salva!");
  }

  return(
    <div style={{minHeight:"100vh",background:E.bg,position:"relative",overflowX:"hidden",fontFamily:"'EB Garamond',serif"}}>
      <Stars/>
      <SideBars/>
      <div style={{position:"fixed",top:"10%",left:"-5%",width:"40vw",height:"35vh",borderRadius:"50%",background:"radial-gradient(circle,rgba(61,40,96,.06) 0%,transparent 70%)",pointerEvents:"none",zIndex:0}}/>
      <div style={{position:"fixed",bottom:"10%",right:"-5%",width:"35vw",height:"30vh",borderRadius:"50%",background:"radial-gradient(circle,rgba(123,95,160,.04) 0%,transparent 70%)",pointerEvents:"none",zIndex:0}}/>

      <div style={{position:"relative",zIndex:1,maxWidth:580,margin:"0 auto",padding:"0 18px 80px"}}>

        {/* Chave API */}
        <div style={{position:"relative",paddingTop:12}}>
          <button onClick={()=>setShowKey(s=>!s)} style={{position:"absolute",top:12,right:0,background:"transparent",border:`1px solid ${apiKey?E.deepDim:"rgba(200,80,60,.4)"}`,borderRadius:8,padding:"4px 10px",color:apiKey?E.textFaint:"rgba(220,100,80,.8)",fontFamily:"'Cinzel',serif",fontSize:8,letterSpacing:2,cursor:"pointer"}}>
            {apiKey?"⚙ API OK":"⚠ CONFIG API"}
          </button>
          {showKey&&(
            <div style={{background:E.panel,border:`1px solid ${E.border}`,borderRadius:10,padding:"14px 16px",marginTop:40}}>
              <div className="cinzel" style={{fontSize:8,letterSpacing:3,color:E.purpleDim,marginBottom:8}}>CHAVE ANTHROPIC API</div>
              <div style={{display:"flex",gap:8}}>
                <input value={apiKey} onChange={e=>setApiKey(e.target.value)} placeholder="sk-ant-..." type="password"
                  style={{flex:1,background:"rgba(5,3,10,.9)",border:`1px solid ${E.deepDim}`,borderRadius:7,padding:"9px 12px",color:E.text,fontSize:13,outline:"none"}}/>
                <button onClick={()=>salvarKey(apiKey)} className="cinzel"
                  style={{background:"rgba(123,95,160,.15)",border:`1px solid ${E.purpleBr}`,borderRadius:7,padding:"9px 16px",color:E.purpleBr,fontSize:9,letterSpacing:2,cursor:"pointer"}}>SALVAR</button>
              </div>
            </div>
          )}
        </div>

        {/* Header */}
        <div style={{textAlign:"center",padding:"24px 0 20px"}}>
          <div className="cinzel" style={{fontSize:8,letterSpacing:8,color:E.purpleDim,marginBottom:8,animation:"sh 3s ease-in-out infinite"}}>✦ ESCOLA DO ARCANO ✦</div>
          <div style={{fontSize:44,marginBottom:8,animation:"eyePulse 4s ease-in-out infinite"}}>🌙</div>
          <h1 className="gothic" style={{fontSize:"clamp(26px,7vw,42px)",color:E.purplePale,letterSpacing:4,marginBottom:4,textShadow:`0 0 30px rgba(123,95,160,.5)`}}>
            Lunalva Estudo
          </h1>
          <p className="gothic" style={{fontSize:"clamp(12px,3.5vw,17px)",color:E.purple,letterSpacing:2,marginBottom:10,opacity:.85,fontStyle:"italic"}}>
            O caminho começa pelo conhecimento
          </p>
          <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:8,marginBottom:6}}>
            <div style={{flex:1,height:1,background:`linear-gradient(90deg,transparent,${E.deep})`}}/>
            <div style={{color:E.purpleDim,fontSize:16}}>✦</div>
            <div style={{flex:1,height:1,background:`linear-gradient(90deg,${E.deep},transparent)`}}/>
          </div>
          <p className="cinzel" style={{fontSize:8,letterSpacing:3,color:E.textDim}}>FUNDAMENTOS · 78 ARCANOS · EXERCÍCIOS DE INTUIÇÃO</p>
        </div>

        {/* Tabs */}
        <Panel style={{padding:4,marginBottom:20,background:"transparent"}}>
          {TABS_E.map(t=>(
            <button key={t.id} onClick={()=>setTab(t.id)} className="cinzel" style={{width:"50%",padding:"9px 4px",borderRadius:8,border:"none",background:tab===t.id?"rgba(123,95,160,.11)":"transparent",color:tab===t.id?E.purple:E.textDim,fontSize:"clamp(9px,2.5vw,11px)",letterSpacing:1.5,transition:"all .2s",cursor:"pointer",borderBottom:tab===t.id?`1px solid ${E.purpleBr}`:"1px solid transparent"}}>
              <div style={{marginBottom:2,fontSize:14}}>{t.icon}</div>
              <div>{t.l}</div>
            </button>
          ))}
        </Panel>

        {tab==="fund"&&<TabFundamentos/>}
        {tab==="arcanos"&&<TabArcanos/>}

        {/* Footer */}
        <div style={{textAlign:"center",marginTop:40}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:8,marginBottom:7}}>
            <div style={{flex:1,height:1,background:`linear-gradient(90deg,transparent,${E.deep})`}}/>
            <div style={{color:E.purpleDim,fontSize:14}}>🌙</div>
            <div style={{flex:1,height:1,background:`linear-gradient(90deg,${E.deep},transparent)`}}/>
          </div>
          <div className="cinzel" style={{fontSize:7,letterSpacing:3,color:E.textFaint}}>✦ LUNALVA ESTUDO · MATERIAL SAGRADO ✦</div>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
